<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nano Banana Enhancer</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

img{
width:100%;
margin-top:15px;
border-radius:15px;
}

#loading{
display:none;
margin-top:15px;
}
</style>
</head>
<body>

<div class="card">
<h2>🔑 API Key</h2>

<input
type="password"
id="apiKey"
placeholder="Pega tu API Key">

<button onclick="saveKey()">
Guardar API
</button>
</div>

<div class="card">

<h2>📸 Imagen</h2>

<input
type="file"
id="fileInput"
accept="image/*">

<img id="preview">

<button onclick="enhanceImage()">
✨ Mejorar Imagen
</button>

<div id="loading">
Procesando...
</div>

</div>

<div class="card">

<h2>🖼 Resultado</h2>

<img id="result">

</div>

<script>

function saveKey(){

localStorage.setItem(
"gemini_api_key",
document.getElementById("apiKey").value
);

alert("API guardada");

}

window.onload=()=>{

const key=
localStorage.getItem(
"gemini_api_key"
);

if(key){

document.getElementById(
"apiKey"
).value=key;

}

};

const fileInput=
document.getElementById(
"fileInput"
);

fileInput.addEventListener(
"change",
e=>{

const file=e.target.files[0];

const reader=
new FileReader();

reader.onload=(event)=>{

document.getElementById(
"preview"
).src=
event.target.result;

};

reader.readAsDataURL(file);

}
);

async function enhanceImage(){

const API_KEY=
localStorage.getItem(
"gemini_api_key"
);

if(!API_KEY){

alert(
"Configura tu API Key"
);

return;
}

const file=
fileInput.files[0];

if(!file){

alert(
"Selecciona una imagen"
);

return;
}

document.getElementById(
"loading"
).style.display=
"block";

const base64=
await fileToBase64(file);

const pureBase64=
base64.split(",")[1];

const response=
await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

contents:[{

parts:[

{
text:`
Improve image quality.
Reduce blur.
Reduce compression artifacts.
Improve clarity.
Restore details where possible.
Preserve composition.
Do not modify objects.
Keep original colors.
`
},

{
inline_data:{
mime_type:file.type,
data:pureBase64
}
}

]

}]

})

}
);

const data=
await response.json();

console.log(data);

document.getElementById(
"loading"
).style.display=
"none";

try{

const parts=
data.candidates[0]
.content.parts;

for(const part of parts){

if(part.inlineData){

document.getElementById(
"result"
).src=

`data:image/png;base64,${
part.inlineData.data
}`;

return;

}

if(part.inline_data){

document.getElementById(
"result"
).src=

`data:image/png;base64,${
part.inline_data.data
}`;

return;

}

}

alert(
"No se encontró imagen en la respuesta."
);

}catch(err){

console.error(err);

alert(
"Error procesando respuesta."
);

}

}

function fileToBase64(file){

return new Promise(
(resolve,reject)=>{

const reader=
new FileReader();

reader.onload=
()=>resolve(
reader.result
);

reader.onerror=
error=>reject(
error
);

reader.readAsDataURL(
file
);

}
);

}

</script>

</body>
</html>
