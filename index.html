<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chat-container {
            height: calc(100vh - 80px);
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .user-message {
            background-color: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: #f3f4f6;
            color: #111827;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .typing {
            display: inline-flex;
            align-items: center;
        }
        .typing span {
            height: 5px;
            width: 5px;
            background-color: #6b7280;
            border-radius: 50%;
            animation: typing 1.2s infinite ease-in-out;
            margin: 0 2px;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar de configuración -->
        <div class="w-80 bg-gray-900 border-r border-gray-800 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fas fa-robot text-blue-500"></i>
                    Chat IA
                </h1>
            </div>
            
            <div class="p-6 flex-1 overflow-auto">
                <div class="mb-8">
                    <h2 class="text-sm font-semibold text-gray-400 mb-3 flex items-center gap-2">
                        <i class="fas fa-key"></i> CONFIGURACIÓN API
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Proveedor</label>
                            <select id="provider" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                                <option value="openai">OpenAI (GPT)</option>
                                <option value="groq">Groq (Llama, Mixtral)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">API Key</label>
                            <div class="relative">
                                <input 
                                    type="password" 
                                    id="apiKey" 
                                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500"
                                    placeholder="sk-... o gsk_...">
                                <button onclick="toggleKeyVisibility()" 
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">La clave se guarda solo en tu navegador.</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Modelo</label>
                            <select id="model" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                                <!-- Se llenará dinámicamente -->
                            </select>
                        </div>
                    </div>
                </div>
                
                <button onclick="saveSettings()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-medium transition">
                    Guardar Configuración
                </button>
                
                <div class="mt-8 text-xs text-gray-500">
                    <p class="mb-2">Consejos:</p>
                    <ul class="space-y-1 list-disc pl-4">
                        <li>Obtén tu API Key en platform.openai.com o console.groq.com</li>
                        <li>La conversación se guarda en tu navegador</li>
                    </ul>
                </div>
            </div>
            
            <div class="p-6 border-t border-gray-800">
                <button onclick="clearChat()" 
                        class="w-full text-red-400 hover:text-red-500 py-2 text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-trash"></i>
                    Limpiar conversación
                </button>
            </div>
        </div>
        
        <!-- Área de chat -->
        <div class="flex-1 flex flex-col">
            <!-- Header -->
            <div class="h-16 bg-gray-900 border-b border-gray-800 flex items-center px-6">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div>
                        <p class="font-medium" id="chatTitle">Asistente IA</p>
                        <p class="text-xs text-green-400 flex items-center gap-1">
                            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                            Conectado
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Mensajes -->
            <div id="chat" class="flex-1 chat-container overflow-y-auto p-6 space-y-6 bg-gray-950"></div>
            
            <!-- Input -->
            <div class="p-6 bg-gray-900 border-t border-gray-800">
                <div class="max-w-3xl mx-auto">
                    <div class="flex gap-3">
                        <input 
                            type="text" 
                            id="userInput" 
                            class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500"
                            placeholder="Escribe tu mensaje...">
                        <button onclick="sendMessage()" 
                                class="bg-blue-600 hover:bg-blue-700 w-12 h-12 rounded-2xl flex items-center justify-center transition">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <p class="text-center text-xs text-gray-500 mt-3">
                        Presiona <span class="font-mono bg-gray-800 px-1 rounded">Enter</span> para enviar
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables
        let messages = [];
        let apiKey = '';
        let provider = 'openai';
        let model = 'gpt-4o-mini';
        
        // Cargar configuración guardada
        function loadSettings() {
            const savedKey = localStorage.getItem('aiApiKey');
            const savedProvider = localStorage.getItem('aiProvider');
            const savedModel = localStorage.getItem('aiModel');
            
            if (savedKey) {
                apiKey = savedKey;
                document.getElementById('apiKey').value = savedKey;
            }
            if (savedProvider) {
                provider = savedProvider;
                document.getElementById('provider').value = savedProvider;
            }
            updateModels();
            if (savedModel) {
                model = savedModel;
                document.getElementById('model').value = savedModel;
            }
        }
        
        // Actualizar lista de modelos según proveedor
        function updateModels() {
            const modelSelect = document.getElementById('model');
            modelSelect.innerHTML = '';
            
            if (provider === 'openai') {
                const models = [
                    {value: 'gpt-4o-mini', text: 'GPT-4o mini (Rápido)'},
                    {value: 'gpt-4o', text: 'GPT-4o'},
                    {value: 'gpt-3.5-turbo', text: 'GPT-3.5 Turbo'}
                ];
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.value;
                    opt.textContent = m.text;
                    modelSelect.appendChild(opt);
                });
            } else if (provider === 'groq') {
                const models = [
                    {value: 'llama3-70b-8192', text: 'Llama 3 70B'},
                    {value: 'mixtral-8x7b-32768', text: 'Mixtral 8x7B'},
                    {value: 'gemma2-9b-it', text: 'Gemma 2 9B'}
                ];
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.value;
                    opt.textContent = m.text;
                    modelSelect.appendChild(opt);
                });
            }
            modelSelect.value = model;
        }
        
        // Guardar configuración
        function saveSettings() {
            apiKey = document.getElementById('apiKey').value.trim();
            provider = document.getElementById('provider').value;
            model = document.getElementById('model').value;
            
            localStorage.setItem('aiApiKey', apiKey);
            localStorage.setItem('aiProvider', provider);
            localStorage.setItem('aiModel', model);
            
            alert('✅ Configuración guardada correctamente');
        }
        
        // Visibilidad de la API Key
        function toggleKeyVisibility() {
            const input = document.getElementById('apiKey');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        
        // Añadir mensaje al chat
        function addMessage(role, content) {
            const chat = document.getElementById('chat');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            messageDiv.innerHTML = `
                <div class="${role === 'user' ? 'user-message' : 'ai-message'} message">
                    ${content}
                </div>
            `;
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }
        
        // Mostrar indicador de escritura
        function showTyping() {
            const chat = document.getElementById('chat');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'flex justify-start';
            typingDiv.innerHTML = `
                <div class="ai-message message typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;
            return typingDiv;
        }
        
        // Enviar mensaje
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!apiKey) {
                alert('⚠️ Por favor ingresa tu API Key en el panel lateral');
                return;
            }
            
            // Añadir mensaje del usuario
            addMessage('user', text);
            messages.push({role: 'user', content: text});
            input.value = '';
            
            // Mostrar "escribiendo"
            const typing = showTyping();
            
            try {
                let responseText = '';
                
                if (provider === 'openai') {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: messages,
                            temperature: 0.7
                        })
                    });
                    
                    const data = await response.json();
                    responseText = data.choices[0].message.content;
                } 
                else if (provider === 'groq') {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: messages,
                            temperature: 0.7
                        })
                    });
                    
                    const data = await response.json();
                    responseText = data.choices[0].message.content;
                }
                
                // Eliminar indicador de escritura
                typing.remove();
                
                // Añadir respuesta
                addMessage('assistant', responseText);
                messages.push({role: 'assistant', content: responseText});
                
            } catch (error) {
                typing.remove();
                addMessage('assistant', '❌ Error al conectar con la IA. Verifica tu API Key y conexión.');
                console.error(error);
            }
        }
        
        // Limpiar chat
        function clearChat() {
            if (confirm('¿Estás seguro de que quieres borrar toda la conversación?')) {
                messages = [];
                document.getElementById('chat').innerHTML = '';
            }
        }
        
        // Event listeners
        function setupEventListeners() {
            const input = document.getElementById('userInput');
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // Cambiar modelos al cambiar proveedor
            document.getElementById('provider').addEventListener('change', function() {
                provider = this.value;
                updateModels();
            });
        }
        
        // Inicializar
        window.onload = function() {
            loadSettings();
            setupEventListeners();
            
            // Mensaje de bienvenida
            setTimeout(() => {
                addMessage('assistant', '¡Hola! Soy tu asistente IA. ¿En qué puedo ayudarte hoy?');
            }, 600);
        };
    </script>
</body>
</html>
